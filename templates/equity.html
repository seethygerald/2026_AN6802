<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static',filename='styles.css') }}">
</head>

<body>
    <div class="container">
        <h2>Google Share Enquiry - RAG vs LLM</h2>
        <form id="equity-form">
            <input id="q" name="q" type="text" placeholder="Ask a question" required>
            <input id="ask-btn" type="submit" value="Ask">
        </form>

        <h3>RAG Answer</h3>
        <p id="rag-answer">-</p>

        <h3>LLM-only Answer</h3>
        <p id="llm-answer">-</p>

        <p id="status"></p>
        <p id="error" style="color:red;"></p>

        <form action="/main" method="post">
            <input type="submit" value="Main">
        </form>
    </div>

    <script>
        const form = document.getElementById("equity-form");
        const askBtn = document.getElementById("ask-btn");
        const statusEl = document.getElementById("status");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            document.getElementById("error").textContent = "";
            statusEl.textContent = "Thinking...";
            askBtn.disabled = true;

            const q = document.getElementById("q").value;

            try {
                const response = await fetch("/equity/query", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({q})
                });

                let data = {};
                const contentType = response.headers.get("content-type") || "";
                if (contentType.includes("application/json")) {
                    data = await response.json();
                } else {
                    const text = await response.text();
                    data = { error: text || "Request failed" };
                }

                if (!response.ok) {
                    document.getElementById("error").textContent = data.error || "Request failed";
                    return;
                }

                document.getElementById("rag-answer").textContent = data.rag_answer || "-";
                document.getElementById("llm-answer").textContent = data.llm_answer || "-";
                if (data.warning) {
                    statusEl.textContent = "Warning: retrieval unavailable, showing degraded response.";
                }
            } catch (err) {
                document.getElementById("error").textContent = "Network error. Please try again.";
            } finally {
                statusEl.textContent = "";
                askBtn.disabled = false;
            }
        });
    </script>
</body>
